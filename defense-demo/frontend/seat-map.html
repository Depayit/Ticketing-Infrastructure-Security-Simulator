<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThaiTicket Major — Seat Selection</title>
  <link rel="stylesheet" href="/static/Ticket.css" />
  <script src="/static/telemetry.js"></script>
  <script src="/static/funnel-guard.js"></script>
  <script src="/static/Ticket-ui.js"></script>
</head>
<body>
  <header class="Ticket-header">
    <div class="ticket-logo">
      <div class="ticket-logo-main">
        <span class="ticket-logo-badge">Ticket</span>
        <span>THAITICKET MAJOR</span>
      </div>
      <span class="ticket-logo-sub">a ticketmaster company</span>
    </div>
  </header>

  <main class="Ticket-main Ticket-main-left" style="max-width: 1100px;">
    <div class="nav-links">
      <a href="/">← ห้องรอ</a>
      <a href="/admin">Defense Admin</a>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
      <div>
        <h1 class="Ticket-event-title" id="event-name" style="margin-bottom: 8px;"></h1>
        <p class="Ticket-copy" style="margin: 0;">สนามกีฬาแห่งชาติราชมงคล</p>
      </div>
      <p id="purchase-timer" class="purchase-timer" style="font-size: 1.2rem; background: #fff3cd; padding: 6px 12px; border-radius: 6px;"></p>
    </div>

    <div id="defense-msg" class="alert-banner hidden"></div>

    <div style="display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap;">
      
      <!-- Left side: Fake Seat Map -->
      <div style="flex: 1; min-width: 300px; background: #000; padding: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative;">
        <!-- Seat Map Image -->
        <img src="/static/seat-map-image.png" alt="BTS World Tour Arirang - Seat Map" style="width: 100%; max-width: 700px; height: auto; border-radius: 8px; display: block;" />
      </div>

      <!-- Right side: Zone Selection -->
      <div style="width: 380px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <!-- Show Date Selector -->
        <h3 style="margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 12px; margin-bottom: 16px;">📅 เลือกรอบการแสดง</h3>
        <div id="show-date-selector" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;">
          <label class="show-date-option" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; background: #fff;">
            <input type="radio" name="show-date" value="2569-12-03" style="accent-color: #2563eb; width: 18px; height: 18px; cursor: pointer;" />
            <div>
              <div style="font-weight: 600; font-size: 0.95rem; color: #1e293b;">วันพฤหัสบดีที่ 3 ธันวาคม 2569</div>
              <div style="font-size: 0.78rem; color: #64748b;">รอบที่ 1</div>
            </div>
          </label>
          <label class="show-date-option" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; background: #fff;">
            <input type="radio" name="show-date" value="2569-12-05" style="accent-color: #2563eb; width: 18px; height: 18px; cursor: pointer;" />
            <div>
              <div style="font-weight: 600; font-size: 0.95rem; color: #1e293b;">วันเสาร์ที่ 5 ธันวาคม 2569</div>
              <div style="font-size: 0.78rem; color: #64748b;">รอบที่ 2</div>
            </div>
          </label>
          <label class="show-date-option" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; background: #fff;">
            <input type="radio" name="show-date" value="2569-12-06" style="accent-color: #2563eb; width: 18px; height: 18px; cursor: pointer;" />
            <div>
              <div style="font-weight: 600; font-size: 0.95rem; color: #1e293b;">วันอาทิตย์ที่ 6 ธันวาคม 2569</div>
              <div style="font-size: 0.78rem; color: #64748b;">รอบที่ 3</div>
            </div>
          </label>
        </div>

        <h3 style="margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 12px; margin-bottom: 20px;">เลือกโซนและราคา (Pricing)</h3>
        <div class="seats-grid" id="seats" style="grid-template-columns: 1fr; gap: 10px; margin: 0;"></div>
        
        <div id="quantity-section" style="display: none; margin: 24px 0; background: #fff; padding: 16px; border: 1px solid #e5e7eb; border-radius: 8px;">
          <label for="ticket-quantity" style="font-weight: 600; display: block; margin-bottom: 8px;">จำนวนบัตร (สูงสุด 4 ใบ):</label>
          <select id="ticket-quantity" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px;">
            <option value="1">1</option>
          </select>
        </div>

        <p id="status-msg" class="Ticket-copy" style="font-weight: 600; color: #b91c1c; margin-top: 16px;"></p>
        <button id="btn-checkout" class="ticket-btn" style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 10px;" disabled>ยืนยันและไปชำระเงิน</button>
      </div>

    </div>
  </main>

  <footer class="Ticket-footer"></footer>
  <script src="/static/seat-map.js"></script>
</body>
</html>
